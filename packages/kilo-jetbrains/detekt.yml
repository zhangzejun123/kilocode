# Detekt configuration for kilo-jetbrains.
#
# Enforces file size and cyclomatic complexity limits — the Kotlin
# equivalent of the ESLint complexity/max-lines rules used by the
# VS Code extension (packages/kilo-vscode/eslint.config.mjs).
#
# New code must stay within the default limits. Do not raise these
# caps; refactor instead.


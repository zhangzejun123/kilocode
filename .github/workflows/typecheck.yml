name: typecheck

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 # kilocode_change

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      # kilocode_change start
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      # kilocode_change end

      - name: Run typecheck
        run: bun typecheck

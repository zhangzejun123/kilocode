name: publish
run-name: "${{ format('{0} {1}', inputs.pre_release && 'pre-release' || 'release', inputs.bump) }}"

on:
  # push:
  #   branches:
  #     - ci
  #     - dev
  #     - beta
  #     - snapshot-*
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Override version (optional)"
        required: false
        type: string
      pre_release:
        description: "Publish as pre-release (VS Code marketplace)"
        required: false
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || inputs.bump }}

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  version:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.repository == 'Kilo-Org/kilocode'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - name: Install Kilo
        if: inputs.bump || inputs.version
        run: bun i -g @kilocode/cli

      - id: version
        run: |
          ./script/version.ts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          KILO_BUMP: ${{ inputs.bump }}
          KILO_VERSION: ${{ inputs.version }}
          KILO_API_KEY: ${{ secrets.KILO_API_KEY }}
          KILO_ORG_ID: ${{ secrets.KILO_ORG_ID }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}

  build-cli:
    needs: version
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.repository == 'Kilo-Org/kilocode'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - name: Build
        id: build
        run: |
          ./packages/opencode/script/build.ts
        env:
          KILO_VERSION: ${{ needs.version.outputs.version }}
          KILO_RELEASE: ${{ needs.version.outputs.release }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - uses: actions/upload-artifact@v4
        with:
          name: kilo-cli
          path: packages/opencode/dist

    outputs:
      version: ${{ needs.version.outputs.version }}

  build-vscode:
    needs: build-cli
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.repository == 'Kilo-Org/kilocode'
    steps:
      - uses: actions/checkout@v3

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install @vscode/vsce
        run: bun install -g @vscode/vsce

      - uses: actions/download-artifact@v4
        with:
          name: kilo-cli
          path: packages/opencode/dist

      - name: Build VSIX packages
        run: bun script/build.ts
        working-directory: ./packages/kilo-vscode
        env:
          CLI_DIST_DIR: ../../packages/opencode/dist
          KILO_VERSION: ${{ needs.build-cli.outputs.version }}
          KILO_PRE_RELEASE: ${{ inputs.pre_release }}
          GH_REPO: ${{ github.repository }}

      - uses: actions/upload-artifact@v4
        with:
          name: kilo-vscode
          path: packages/kilo-vscode/out

